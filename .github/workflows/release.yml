name: Release

on:
  push:
    tags:
      - 'v*'

env:
  API_BASE: https://api.vibenalytics.dev/api
  PUBLIC_REPO: vibenalytics/vibenalytics-cli

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vibenalytics-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vibenalytics-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vibenalytics-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vibenalytics-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vibenalytics dist/${{ matrix.artifact }}
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;

          # Generate combined checksums.json
          cd release
          echo '{' > checksums.json
          first=true
          for f in *.tar.gz; do
            platform="${f%.tar.gz}"
            checksum=$(cat "${f}.sha256" | awk '{print $1}')
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> checksums.json
            fi
            printf '  "%s": "%s"' "$platform" "$checksum" >> checksums.json
          done
          echo '' >> checksums.json
          echo '}' >> checksums.json

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "$VERSION" \
            --repo "$PUBLIC_REPO" \
            --title "Vibenalytics CLI $VERSION" \
            --notes "Release $VERSION" \
            release/*
